server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: fixcart-backend
  datasource:
    url: ${JDBC_DATABASE_URL:${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fixcart_platform}}}
    username: ${DB_USERNAME:${POSTGRES_USER:postgres}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  push:
    provider: ${PUSH_PROVIDER:log}
    expo:
      endpoint: ${EXPO_PUSH_ENDPOINT:https://exp.host/--/api/v2/push/send}
      access-token: ${EXPO_PUSH_ACCESS_TOKEN:}
  jwt:
    secret: ${JWT_SECRET:fixcart-secret-key-fixcart-secret-key-fixcart-secret-key-123456}
    access-expiration-seconds: ${JWT_ACCESS_EXPIRATION:3600}
    refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION:1209600}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  payment:
    provider: ${PAYMENT_PROVIDER:stub}
    currency: ${PAYMENT_CURRENCY:inr}
    success-url: ${PAYMENT_SUCCESS_URL:https://example.com/payment-success}
    cancel-url: ${PAYMENT_CANCEL_URL:https://example.com/payment-cancelled}
  ai:
    enabled: ${AI_ENABLED:false}
    provider: ${AI_PROVIDER:groq}
    base-url: ${AI_BASE_URL:https://api.groq.com/openai/v1}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:llama-3.1-8b-instant}
    temperature: ${AI_TEMPERATURE:0.3}
    max-tokens: ${AI_MAX_TOKENS:500}
  seed:
    enabled: ${APP_SEED_ENABLED:true}

logging:
  level:
    com.fixcart.platform: INFO

