services:
  postgres:
    image: postgres:16
    container_name: fixcart-postgres
    environment:
      POSTGRES_DB: fixcart_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - fixcart-postgres-data:/var/lib/postgresql/data

volumes:
  fixcart-postgres-data:
