server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fixcart_auth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

app:
  jwt:
    secret: ${JWT_SECRET:mySecretKeyForFixCartApplicationThatShouldBeVeryLongAndSecure}
    expiration: 3600000 # 1 hour
    refresh-expiration: 604800000 # 7 days

logging:
  level:
    com.fixcart: DEBUG
